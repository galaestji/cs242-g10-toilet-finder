<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jood Jood - Restroom Finder</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header class="top-bar">
            <i class="fa-regular fa-face-smile icon-logo"></i>
            <span class="brand-name">Jood Jood</span>
        </header>

        <main class="main-content">
            <div class="status-container" id="location-status" style="display: none; width: fit-content; margin-left: auto; margin-right: 15%; transform: translateX(35%); margin-bottom: -15px;">
                <div class="status-badge">
                    <div class="status-dot"></div>
                    <span>เปิดตำแหน่งแล้ว</span>
                </div>
            </div>

            <h1 class="main-title">
                <span class="text-orange">J</span><span class="text-blue">ood</span>
                <span class="text-orange">J</span><span class="text-blue">ood</span>
            </h1>

            <div class="image-placeholder">
                <img src="photo/home-icon.png" alt="กำลังค้นหาห้องน้ำ" class="main-illustration">
            </div>

            <div class="subtitle-box">
                <p>กำลังมองหาห้องน้ำอยู่ใช่ไหม<br>กดเพื่อค้นหาเลยสิ !!</p>
            </div>

            <div class="search-section">
                <div class="search-input-box">
                    <i class="fa-solid fa-location-dot location-icon"></i>
                    <input type="text" id="user-location" placeholder="ตำแหน่งปัจจุบัน" value="">
                </div>
                
                <button class="btn-search" id="search-btn">
                    <i class="fa-solid fa-magnifying-glass"></i> ค้นหาทันที
                </button>
            </div>
        </main>

        <nav class="bottom-nav">
            <a href="#" class="nav-item active">
                <div class="icon-wrapper"><i class="fa-solid fa-map"></i></div>
                <span>ค้นหา</span>
            </a>
            
            <a href="#" class="nav-item unavailable-feature">
                <div class="icon-wrapper"><i class="fa-regular fa-bookmark"></i></div>
                <span>รายการโปรด</span>
            </a>
            
            <a href="#" class="nav-item unavailable-feature">
                <div class="icon-wrapper"><i class="fa-solid fa-gear"></i></div>
                <span>ตั้งค่า</span>
            </a>
        </nav>
    </div>

    <div id="comingSoonPopup" class="custom-popup-overlay">
        <div class="custom-popup-box">
            <i class="fa-solid fa-person-digging popup-icon"></i>
            <h3>กำลังพัฒนา...</h3>
            <p>ฟีเจอร์นี้ยังไม่เปิดให้บริการ</p>
            <button class="btn-popup-close" id="closePopupBtn">ตกลง</button>
        </div>
    </div>
</body>

<script>
    const locationStatusBadge = document.getElementById('location-status')
    if (navigator.permissions) {
        navigator.permissions.query({ name: 'geolocation' }).then(function(result) {
            if (result.state === 'granted') {
                locationStatusBadge.style.display = 'block';
            } else {
                locationStatusBadge.style.display = 'none';
            }

            result.onchange = function() {
                if (this.state === 'granted') {
                    locationStatusBadge.style.display = 'block';
                } else {
                    locationStatusBadge.style.display = 'none';
                }
            };
        });
    }

    const searchBtn = document.getElementById('search-btn');
    const locationInput = document.getElementById('user-location');

    function goToSearch() {
        if (!navigator.geolocation) {
            alert('เบราว์เซอร์ของคุณไม่รองรับ GPS กรุณาใช้บนมือถือหรือเบราว์เซอร์ที่รองรับ');
            return;
        }

        locationInput.value = 'กำลังค้นหาตำแหน่ง...';
        navigator.geolocation.getCurrentPosition(function(position) {
            const lat = position.coords.latitude.toFixed(6);
            const lon = position.coords.longitude.toFixed(6);
            locationInput.value = `${lat}, ${lon}`;
            window.location.href = `show.html?start=${encodeURIComponent(lat + ', ' + lon)}`;
        }, function(error) {
            let message = '';
            switch (error.code) {
                case error.PERMISSION_DENIED:
                    message = 'กรุณาอนุญาตให้เข้าถึง GPS เพื่อค้นหาห้องน้ำใกล้คุณ';
                    break;
                case error.POSITION_UNAVAILABLE:
                    message = 'ไม่สามารถรับตำแหน่ง GPS ได้ กรุณาลองใหม่';
                    break;
                case error.TIMEOUT:
                    message = 'ขอเวลาหาพิกัดนานเกินไป กรุณาลองใหม่';
                    break;
                default:
                    message = 'เกิดข้อผิดพลาดในการอ่านตำแหน่ง GPS';
            }
            alert(message);
            locationInput.value = '';
        }, {
            enableHighAccuracy: true,
            timeout: 15000,
            maximumAge: 0
        });
    }

    searchBtn.addEventListener('click', goToSearch);

    // ระบบ Popup ฟีเจอร์ที่ยังไม่เปิดใช้งาน
        const popup = document.getElementById('comingSoonPopup');
        const closeBtn = document.getElementById('closePopupBtn');
        const unavailableBtns = document.querySelectorAll('.unavailable-feature');

        if(popup && closeBtn) { 
            unavailableBtns.forEach(btn => {
                btn.addEventListener('click', function(e) {
                    e.preventDefault(); 
                    popup.classList.add('show');
                });
            });

            closeBtn.addEventListener('click', function() {
                popup.classList.remove('show');
            });

            popup.addEventListener('click', function(e) {
                if (e.target === popup) {
                    popup.classList.remove('show');
                }
            });
        }
</script>
</html>
