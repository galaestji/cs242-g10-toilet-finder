<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jood Jood - Restroom Finder</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="home.css">
</head>
<body>
    <div class="app-container">
        <header class="top-bar">
            <i class="fa-regular fa-face-smile icon-logo"></i>
            <span class="brand-name">Jood Jood</span>
        </header>

        <main class="main-content">
            <div class="status-container">
                <div class="status-badge">
                    <div class="status-dot"></div>
                    <span>เปิดตำแหน่งแล้ว</span>
                </div>
            </div>

            <h1 class="main-title">
                <span class="text-orange">J</span><span class="text-blue">ood</span>
                <span class="text-orange">J</span><span class="text-blue">ood</span>
            </h1>

            <div class="image-placeholder">
                <img src="photo/home-icon.png" alt="กำลังค้นหาห้องน้ำ" class="main-illustration">
            </div>

            <div class="subtitle-box">
                <p>กำลังมองหาห้องน้ำอยู่ใช่ไหม<br>กดเพื่อค้นหาเลยสิ !!</p>
            </div>

            <div class="search-section">
                <div class="search-input-box">
                    <i class="fa-solid fa-location-dot location-icon"></i>
                    <input type="text" value="ตำแหน่งปัจจุบัน" readonly>
                </div>
                
                <button class="btn-search">
                    <i class="fa-solid fa-magnifying-glass"></i> ค้นหาทันที
                </button>
            </div>
        </main>

        <nav class="bottom-nav">
            <a href="#" class="nav-item active">
                <div class="icon-wrapper">
                    <i class="fa-solid fa-map"></i>
                </div>
                <span>ค้นหา</span>
            </a>
            <a href="#" class="nav-item">
                <div class="icon-wrapper">
                    <i class="fa-regular fa-bookmark"></i>
                </div>
                <span>รายการโปรด</span>
            </a>
            <a href="#" class="nav-item">
                <div class="icon-wrapper">
                    <i class="fa-solid fa-gear"></i>
                </div>
                <span>ตั้งค่า</span>
            </a>
        </nav>
    </div>
</body>
</html>
