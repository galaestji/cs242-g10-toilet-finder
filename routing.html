<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jood Jood - Routing</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css" />
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header class="top-bar">
            <i class="fa-regular fa-face-smile icon-logo"></i>
            <span class="brand-name">Jood Jood</span>
        </header>

        <main class="map-content">
            <div id="map" class="map-background"></div>

            <div class="floating-info-card">
                <div class="info-icon">
                    <i class="fa-solid fa-location-dot"></i>
                </div>
                <div class="info-details">
                    <h3 class="info-title" id="target-name">ห้องน้ำปลายทาง</h3>
                    <p class="info-address" id="info-address">สถานที่นำทาง</p>
                </div>
                <div class="info-meta">
                    <span class="meta-dist text-blue">250 เมตร</span>
                    <span class="meta-time"><i class="fa-regular fa-clock"></i> 5 นาที</span>
                </div>
            </div>

            <div class="floating-action-area">
                <button class="btn-end-journey" onclick="openEndJourneyReview()">จบการเดินทาง</button>
            </div>
        </main>

        <nav class="bottom-nav">
            <a href="#" class="nav-item active">
                <div class="icon-wrapper"><i class="fa-solid fa-map"></i></div>
                <span>ค้นหา</span>
            </a>
            
            <a href="#" class="nav-item unavailable-feature">
                <div class="icon-wrapper"><i class="fa-regular fa-bookmark"></i></div>
                <span>รายการโปรด</span>
            </a>
            
            <a href="#" class="nav-item unavailable-feature">
                <div class="icon-wrapper"><i class="fa-solid fa-gear"></i></div>
                <span>ตั้งค่า</span>
            </a>
        </nav>
    </div>

    <div id="reviewPopup" class="custom-popup-overlay">
        <div class="custom-popup-box" style="position: relative;">
            <i class="fa-solid fa-xmark close-icon-x" id="closeReviewBtn"></i>
            <h3 id="reviewTitle">รีวิวห้องน้ำ</h3>
            <div class="star-rating-box" id="starContainer">
                <i class="fa-solid fa-star" data-rating="1"></i>
                <i class="fa-solid fa-star" data-rating="2"></i>
                <i class="fa-solid fa-star" data-rating="3"></i>
                <i class="fa-solid fa-star" data-rating="4"></i>
                <i class="fa-solid fa-star" data-rating="5"></i>
            </div>
            <p id="reviewStatus" class="review-status-text">แตะที่ดาวเพื่อให้คะแนน</p>
            <button class="btn-submit-review" id="saveReviewBtn">บันทึกรีวิว</button>
        </div>
    </div>

    <div id="comingSoonPopup" class="custom-popup-overlay">
        <div class="custom-popup-box">
            <i class="fa-solid fa-person-digging popup-icon"></i>
            <h3>กำลังพัฒนา...</h3>
            <p>ฟีเจอร์นี้ยังไม่เปิดให้บริการ</p>
            <button class="btn-popup-close" id="closePopupBtn">ตกลง</button>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>
    
    <script>
        var style = document.createElement('style');
        style.innerHTML = `
            .info-title {
                white-space: normal !important;
                word-wrap: break-word !important;
                overflow: visible !important;
                text-overflow: clip !important;
                line-height: 1.3;
            }
            .info-details {
                flex: 1;
                overflow: visible !important;
            }
            .floating-info-card {
                height: auto !important;
                padding-bottom: 15px; 
            }
        `;

        document.head.appendChild(style);
        // 1. ตั้งค่าแผนที่เริ่มต้น
        var map = L.map('map', { zoomControl: false }).setView([14.0722, 100.6053], 15);
        
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap'
        }).addTo(map);

        // 2. กำหนดพิกัดปลายทางจาก query string หรือใช้ค่าเริ่มต้น
        var params = new URLSearchParams(window.location.search);
        var destLat = parseFloat(params.get('lat')) || 14.0722;
        var destLng = parseFloat(params.get('lon')) || 100.6053;
        var destName = params.get('name') || 'ห้องน้ำปลายทาง';
        var destLabel = params.get('label') || '';
        var cardDistance = parseInt(params.get('distance'), 10);
        var cardDuration = parseInt(params.get('duration'), 10);
        
        document.getElementById('target-name').textContent = destName;
        document.getElementById('info-address').textContent = destLabel || '';

        var metaDist = document.querySelector('.meta-dist');
        var metaTime = document.querySelector('.meta-time');

        if (!Number.isNaN(cardDistance) && cardDistance > 0 && metaDist) {
            metaDist.textContent = cardDistance + ' เมตร';
        }
        if (!Number.isNaN(cardDuration) && cardDuration > 0 && metaTime) {
            metaTime.innerHTML = '<i class="fa-regular fa-clock"></i> ' + cardDuration + ' นาที';
        }

        // 3. ฟังก์ชันดึงตำแหน่งปัจจุบัน (GPS จริง)
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(function(position) {
                var userLat = position.coords.latitude;
                var userLng = position.coords.longitude;

                // 4. สร้างระบบนำทาง
                var control = L.Routing.control({
                    router: L.Routing.osrmv1({ 
                        serviceUrl: 'https://routing.openstreetmap.de/routed-foot/route/v1',
                        profile: 'foot',
                        useHints: false
                    }),
                    waypoints: [
                        L.latLng(userLat, userLng), // ตำแหน่งปัจจุบันของคุณ
                        L.latLng(destLat, destLng)  // ห้องน้ำปลายทาง
                    ],
                    lineOptions: {
                        styles: [{ color: '#FF7043', weight: 6, opacity: 0.8 }]
                    },
                    addWaypoints: false,
                    routeWhileDragging: false,
                    draggableWaypoints: false,
                    show: false,
                    createMarker: function(i, waypoint, n) {
                        // กำหนด Icon ตามตำแหน่ง
                        var iconHtml = '';
                        if (i === 0) {
                            // จุดเริ่มต้น
                            iconHtml = '<i class="fa-solid fa-location-dot" style="color: #DC3545; text-shadow: 0 0 2px rgba(0,0,0,0.3);"></i>';
                        } else {
                            // จุดปลายทาง
                            iconHtml = '<i class="fa-solid fa-location-dot" style="color: #0056B3; text-shadow: 0 0 2px rgba(0,0,0,0.3);"></i>'
                        }

                        var markerIcon = L.divIcon({
                            className: 'custom-map-pin',
                            html: iconHtml,
                            iconSize: [30, 42],
                            iconAnchor: [15, 42]
                        });
                        
                        return L.marker(waypoint.latLng, { icon: markerIcon });
                    }
                }).addTo(map);

                function updateRouteInfo(route) {
                    if (!Number.isNaN(cardDistance) && cardDistance > 0) {
                        if (metaDist) metaDist.textContent = cardDistance + ' เมตร';
                        if (metaTime) metaTime.innerHTML = '<i class="fa-regular fa-clock"></i> ' + cardDuration + ' นาที';
                    }
                }

                control.on('routesfound', function(e) {
                    var route = e.routes[0];
                    map.fitBounds(L.latLngBounds([userLat, userLng], [destLat, destLng]), { padding: [100, 100] });
                    updateRouteInfo(route);
                });

                control.on('routeselected', function(e) {
                    updateRouteInfo(e.route);
                });

            }, function() {
                alert("กรุณาเปิด GPS และอนุญาตการเข้าถึงตำแหน่งเพื่อนำทาง");
            }, {
                enableHighAccuracy: true 
            });
        } else {
            alert('เบราว์เซอร์ของคุณไม่รองรับ GPS กรุณาเปิด GPS เพื่อใช้งานนำทาง');
        }

        // ระบบรีวิวหลังจบการเดินทาง
        let currentRating = 0;

        function openEndJourneyReview() {
            const savedRating = localStorage.getItem(`review_${destName}`);
            const statusText = document.getElementById('reviewStatus');
            document.getElementById('reviewTitle').textContent = `รีวิว: ${destName}`;

            if (savedRating) {
                currentRating = parseInt(savedRating);
                statusText.textContent = "คุณเคยรีวิวแล้ว (สามารถแก้ไขได้)";
            } else {
                currentRating = 0;
                statusText.textContent = "แตะที่ดาวเพื่อให้คะแนน";
            }
            updateStarsUI(currentRating);
            document.getElementById('reviewPopup').classList.add('show');
        }

        function updateStarsUI(rating) {
            document.querySelectorAll('#starContainer i').forEach(star => {
                if (parseInt(star.dataset.rating) <= rating) {
                    star.classList.add('star-active');
                } else {
                    star.classList.remove('star-active');
                }
            });
        }

        document.querySelectorAll('#starContainer i').forEach(star => {
            star.addEventListener('click', function() {
                currentRating = parseInt(this.dataset.rating);
                updateStarsUI(currentRating);
                document.getElementById('reviewStatus').textContent = `คุณให้คะแนน ${currentRating} ดาว`;
            });
        });

        document.getElementById('saveReviewBtn').addEventListener('click', function() {
            if (currentRating > 0) {
                fetch('/api/add_review', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name: destName.trim(), rating: currentRating })
                })
                .then(r => r.json())
                .then(data => {
                    if (data.status === 'success') {
                        localStorage.setItem(`review_${destName}`, currentRating);
                        alert('ขอบคุณสำหรับรีวิวค่ะ!');
                        window.location.href = 'home.html';
                    } else {
                        alert('เกิดข้อผิดพลาด: ' + data.message);
                    }
                })
                .catch(() => alert('ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้'));
            } else {
                alert('กรุณาเลือกดาวก่อนบันทึกค่ะ');
            }
        });

        document.getElementById('closeReviewBtn').addEventListener('click', function() {
            document.getElementById('reviewPopup').classList.remove('show');
            window.location.href = 'home.html';
        });

        document.getElementById('reviewPopup').addEventListener('click', function(e) {
            if (e.target === this) {
                this.classList.remove('show');
                window.location.href = 'home.html';
            }
        });

        // ระบบ Popup ฟีเจอร์ที่ยังไม่เปิดใช้งาน
        const popup = document.getElementById('comingSoonPopup');
        const closeBtn = document.getElementById('closePopupBtn');
        const unavailableBtns = document.querySelectorAll('.unavailable-feature');

        if(popup && closeBtn) { 
            unavailableBtns.forEach(btn => {
                btn.addEventListener('click', function(e) {
                    e.preventDefault(); 
                    popup.classList.add('show');
                });
            });

            closeBtn.addEventListener('click', function() {
                popup.classList.remove('show');
            });

            popup.addEventListener('click', function(e) {
                if (e.target === popup) {
                    popup.classList.remove('show');
                }
            });
        }
    </script>
</body>
</html>
