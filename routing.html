<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jood Jood - Routing</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css" />
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header class="top-bar">
            <i class="fa-regular fa-face-smile icon-logo"></i>
            <span class="brand-name">Jood Jood</span>
        </header>

        <main class="map-content">
            <div id="map" class="map-background"></div>

            <div class="floating-info-card">
                <div class="info-icon">
                    <i class="fa-solid fa-location-dot"></i>
                </div>
                <div class="info-details">
                    <h3 class="info-title" id="target-name">ห้องน้ำ SC3 ชั้น 1</h3>
                    <p class="info-address">อาคารบรรยายรวม 3 มธ. ศูนย์รังสิต</p>
                </div>
                <div class="info-meta">
                    <span class="meta-dist text-blue">250 เมตร</span>
                    <span class="meta-time"><i class="fa-regular fa-clock"></i> 5 นาที</span>
                </div>
            </div>

            <div class="floating-action-area">
                <a href="home.html" class="btn-end-journey">จบการเดินทาง</a>
            </div>
        </main>

        <nav class="bottom-nav">
            <a href="home.html" class="nav-item">
                <div class="icon-wrapper"><i class="fa-solid fa-map"></i></div>
                <span>ค้นหา</span>
            </a>
            <a href="#" class="nav-item">
                <div class="icon-wrapper"><i class="fa-regular fa-bookmark"></i></div>
                <span>รายการโปรด</span>
            </a>
            <a href="#" class="nav-item">
                <div class="icon-wrapper"><i class="fa-solid fa-gear"></i></div>
                <span>ตั้งค่า</span>
            </a>
        </nav>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>
    
    <script>
        // 1. ตั้งค่าแผนที่เริ่มต้น
        var map = L.map('map', { zoomControl: false }).setView([14.0722, 100.6053], 15);
        
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap'
        }).addTo(map);

        // 2. กำหนดพิกัดปลายทาง (มธ. SC3)
        var destLat = 14.0722;
        var destLng = 100.6053;

        // 3. ฟังก์ชันดึงตำแหน่งปัจจุบันและวาดเส้นทาง
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(function(position) {
                var userLat = position.coords.latitude;
                var userLng = position.coords.longitude;

                // วาดเส้นทางนำทาง
                L.Routing.control({
                    waypoints: [
                        L.latLng(userLat, userLng), // จุดเริ่ม (จาก GPS จริง)
                        L.latLng(destLat, destLng)  // จุดหมาย
                    ],
                    lineOptions: {
                        styles: [{ color: '#0056B3', weight: 6, opacity: 0.8 }] // เส้นสีน้ำเงินหนาๆ
                    },
                    addWaypoints: false,
                    routeWhileDragging: false,
                    show: false, // ซ่อนกล่องข้อความบอกทาง (ให้ดูคลีน)
                    createMarker: function(i, waypoint, n) {
                        // ปรับแต่งหมุด
                        var markerHtml = (i === 0) 
                            ? '<div class="custom-pin pin-start"><i class="fa-solid fa-user"></i></div>'
                            : '<div class="custom-pin pin-dest"><i class="fa-solid fa-restroom"></i></div>';
                        
                        return L.marker(waypoint.latLng, {
                            icon: L.divIcon({
                                className: 'clear-default-icon',
                                html: markerHtml,
                                iconSize: [40, 40],
                                iconAnchor: [20, 20]
                            })
                        });
                    }
                }).addTo(map);

            }, function() {
                alert("กรุณาอนุญาตการเข้าถึงตำแหน่งเพื่อใช้งานระบบนำทาง");
            });
        }
    </script>
</body>
</html>
