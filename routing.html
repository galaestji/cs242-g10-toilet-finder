<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jood Jood - Routing</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css" />
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header class="top-bar">
            <i class="fa-regular fa-face-smile icon-logo"></i>
            <span class="brand-name">Jood Jood</span>
        </header>

        <main class="map-content">
            <div id="map" class="map-background"></div>

            <div class="floating-info-card">
                <div class="info-icon">
                    <i class="fa-solid fa-location-dot"></i>
                </div>
                <div class="info-details">
                    <h3 class="info-title" id="target-name">ห้องน้ำปลายทาง</h3>
                    <p class="info-address" id="info-address">สถานที่นำทาง</p>
                </div>
                <div class="info-meta">
                    <span class="meta-dist text-blue">250 เมตร</span>
                    <span class="meta-time"><i class="fa-regular fa-clock"></i> 5 นาที</span>
                </div>
            </div>

            <div class="floating-action-area">
                <a href="home.html" class="btn-end-journey">จบการเดินทาง</a>
            </div>
        </main>

        <nav class="bottom-nav">
            <a href="#" class="nav-item active">
                <div class="icon-wrapper"><i class="fa-solid fa-map"></i></div>
                <span>ค้นหา</span>
            </a>
            
            <a href="#" class="nav-item unavailable-feature">
                <div class="icon-wrapper"><i class="fa-regular fa-bookmark"></i></div>
                <span>รายการโปรด</span>
            </a>
            
            <a href="#" class="nav-item unavailable-feature">
                <div class="icon-wrapper"><i class="fa-solid fa-gear"></i></div>
                <span>ตั้งค่า</span>
            </a>
        </nav>
    </div>

    <div id="comingSoonPopup" class="custom-popup-overlay">
        <div class="custom-popup-box">
            <i class="fa-solid fa-person-digging popup-icon"></i>
            <h3>กำลังพัฒนา...</h3>
            <p>ฟีเจอร์นี้ยังไม่เปิดให้บริการ</p>
            <button class="btn-popup-close" id="closePopupBtn">ตกลง</button>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>
    
    <script>
        // 1. ตั้งค่าแผนที่เริ่มต้น
        var map = L.map('map', { zoomControl: false }).setView([14.0722, 100.6053], 15);
        
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap'
        }).addTo(map);

        // 2. กำหนดพิกัดปลายทางจาก query string หรือใช้ค่าเริ่มต้น
        var params = new URLSearchParams(window.location.search);
        var destLat = parseFloat(params.get('lat')) || 14.0722;
        var destLng = parseFloat(params.get('lon')) || 100.6053;
        var destName = params.get('name') || 'ห้องน้ำปลายทาง';
        var destLabel = params.get('label') || '';
        var cardDistance = parseInt(params.get('distance'), 10);
        var cardDuration = parseInt(params.get('duration'), 10);
        document.getElementById('target-name').textContent = destName;
        document.getElementById('info-address').textContent = destLabel || `พิกัดปลายทาง: ${destLat.toFixed(6)}, ${destLng.toFixed(6)}`;

        if (!Number.isNaN(cardDistance) && cardDistance > 0) {
            var initialDist = cardDistance >= 1000 ? (cardDistance / 1000).toFixed(1) + ' กม.' : cardDistance + ' เมตร';
            document.querySelector('.meta-dist').textContent = initialDist;
        }
        if (!Number.isNaN(cardDuration) && cardDuration > 0) {
            document.querySelector('.meta-time').innerHTML = '<i class="fa-regular fa-clock"></i> ' + cardDuration + ' นาที';
        }

        // 3. ฟังก์ชันดึงตำแหน่งปัจจุบัน (GPS จริง)
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(function(position) {
                var userLat = position.coords.latitude;
                var userLng = position.coords.longitude;

                // 4. สร้างระบบนำทาง
                var control = L.Routing.control({
                    router: L.Routing.osrmv1({ 
                        serviceUrl: 'https://routing.openstreetmap.de/routed-foot/route/v1' 
                    }),
                    waypoints: [
                        L.latLng(userLat, userLng), // ตำแหน่งปัจจุบันของคุณ
                        L.latLng(destLat, destLng)  // ห้องน้ำปลายทาง
                    ],
                    lineOptions: {
                        styles: [{ color: '#007BFF', weight: 7, opacity: 0.8 }]
                    },
                    addWaypoints: false,
                    routeWhileDragging: false,
                    draggableWaypoints: false,
                    show: false,
                    createMarker: function(i, waypoint, n) {
                        // กำหนด Icon ตามตำแหน่ง
                        var markerIcon;
                        if (i === 0) {
                            // จุดเริ่มต้น
                            markerIcon = L.divIcon({
                                className: 'custom-pin-container',
                                html: '<div class="pin-user"><i class="fa-solid fa-location-crosshairs"></i></div>',
                                iconSize: [40, 40],
                                iconAnchor: [20, 20]
                            });
                        } else {
                            // จุดปลายทาง
                            markerIcon = L.divIcon({
                                className: 'custom-pin-container',
                                html: '<div class="pin-restroom"><i class="fa-solid fa-restroom"></i></div>',
                                iconSize: [40, 40],
                                iconAnchor: [20, 20]
                            });
                        }
                        return L.marker(waypoint.latLng, { icon: markerIcon });
                    }
                }).addTo(map);

                function updateRouteInfo(route) {
                    if (!route || !route.summary) return;
                    var distanceMeters = route.summary.totalDistance || route.summary.total_distance || 0;
                    var timeSeconds = route.summary.totalTime || route.summary.total_time || 0;
                    var distanceText = distanceMeters >= 1000
                        ? (distanceMeters / 1000).toFixed(1) + ' กม.'
                        : Math.round(distanceMeters) + ' เมตร';
                    var durationMinutes = Math.round(timeSeconds / 60);
                    var durationText = durationMinutes > 0 ? durationMinutes + ' นาที' : '1 นาที';

                    var metaDist = document.querySelector('.meta-dist');
                    var metaTime = document.querySelector('.meta-time');
                    if (metaDist) metaDist.textContent = distanceText;
                    if (metaTime) metaTime.innerHTML = '<i class="fa-regular fa-clock"></i> ' + durationText;
                }

                control.on('routesfound', function(e) {
                    var route = e.routes[0];
                    map.fitBounds(L.latLngBounds([userLat, userLng], [destLat, destLng]), { padding: [100, 100] });
                    updateRouteInfo(route);
                });

                control.on('routeselected', function(e) {
                    updateRouteInfo(e.route);
                });

            }, function() {
                alert("กรุณาเปิด GPS และอนุญาตการเข้าถึงตำแหน่งเพื่อนำทาง");
            }, {
                enableHighAccuracy: true 
            });
        } else {
            alert('เบราว์เซอร์ของคุณไม่รองรับ GPS กรุณาเปิด GPS เพื่อใช้งานนำทาง');
        }

        // ระบบ Popup ฟีเจอร์ที่ยังไม่เปิดใช้งาน
        const popup = document.getElementById('comingSoonPopup');
        const closeBtn = document.getElementById('closePopupBtn');
        const unavailableBtns = document.querySelectorAll('.unavailable-feature');

        if(popup && closeBtn) { 
            unavailableBtns.forEach(btn => {
                btn.addEventListener('click', function(e) {
                    e.preventDefault(); 
                    popup.classList.add('show');
                });
            });

            closeBtn.addEventListener('click', function() {
                popup.classList.remove('show');
            });

            popup.addEventListener('click', function(e) {
                if (e.target === popup) {
                    popup.classList.remove('show');
                }
            });
        }
    </script>
</body>
</html>
