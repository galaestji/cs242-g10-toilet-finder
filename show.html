<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jood Jood - Show Map</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header class="top-bar">
            <i class="fa-regular fa-face-smile icon-logo"></i>
            <span class="brand-name">Jood Jood</span>
        </header>

        <main class="map-content">
            <div id="map" class="map-background"></div>

            <div class="bottom-sheet">
                <div class="drag-handle"></div>
                
                <div class="cards-scroll" id="toilet-cards">
                    <div class="toilet-card">
                        <div class="card-status-row">
                            <span>กำลังโหลดผลลัพธ์...</span>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <nav class="bottom-nav">
            <a href="home.html" class="nav-item active">
                <div class="icon-wrapper"><i class="fa-solid fa-map"></i></div>
                <span>ค้นหา</span>
            </a>
            <a href="#" class="nav-item unavailable-feature">
                <div class="icon-wrapper"><i class="fa-regular fa-bookmark"></i></div>
                <span>รายการโปรด</span>
            </a>
            <a href="#" class="nav-item unavailable-feature">
                <div class="icon-wrapper"><i class="fa-solid fa-gear"></i></div>
                <span>ตั้งค่า</span>
            </a>
        </nav>
    </div>

    <div id="comingSoonPopup" class="custom-popup-overlay">
        <div class="custom-popup-box">
            <i class="fa-solid fa-person-digging popup-icon"></i>
            <h3>กำลังพัฒนา...</h3>
            <p>ฟีเจอร์นี้ยังไม่เปิดให้บริการ</p>
            <button class="btn-popup-close" id="closePopupBtn">ตกลง</button>
        </div>
    </div>

    <div id="reviewPopup" class="custom-popup-overlay">
        <div class="custom-popup-box" style="position: relative;">
            <i class="fa-solid fa-xmark close-icon-x" id="closeReviewBtn"></i>
            <h3 id="reviewTitle">รีวิวห้องน้ำ</h3>
            <div class="star-rating-box" id="starContainer">
                <i class="fa-solid fa-star" data-rating="1"></i>
                <i class="fa-solid fa-star" data-rating="2"></i>
                <i class="fa-solid fa-star" data-rating="3"></i>
                <i class="fa-solid fa-star" data-rating="4"></i>
                <i class="fa-solid fa-star" data-rating="5"></i>
            </div>
            <p id="reviewStatus" class="review-status-text">แตะที่ดาวเพื่อให้คะแนน</p>
            <button class="btn-submit-review" id="saveReviewBtn">บันทึกรีวิว</button>
            
            </div>
    </div>

    <script>
        const map = L.map('map', {
            zoomControl: false
        }).setView([14.0722, 100.6053], 15);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);


        let userMarker = null;
        let toiletMarkers = [];

        function parseLatLon(input) {
            const parts = input.split(',').map(part => part.trim());
            if (parts.length !== 2) return null;
            const lat = parseFloat(parts[0]);
            const lon = parseFloat(parts[1]);
            if (Number.isNaN(lat) || Number.isNaN(lon)) return null;
            return { lat, lon };
        }

        function showError(message) {
            const toiletCards = document.getElementById('toilet-cards');
            toiletCards.innerHTML = `<div class="toilet-card"><div class="card-status-row"><span>${message}</span></div></div>`;
            alert(message);
        }

        function setMapMarkers(userCoords, toilets) {
            if (userMarker) map.removeLayer(userMarker);
            toiletMarkers.forEach(marker => map.removeLayer(marker));
            toiletMarkers = [];

            const userIcon = L.divIcon({
                className: 'custom-map-pin',
                html: '<i class="fa-solid fa-location-dot" style="color: #DC3545; text-shadow: 0 0 2px rgba(0,0,0,0.3);"></i>', 
                iconSize: [30, 42],
                iconAnchor: [15, 42],
                popupAnchor: [0, -40]
            });

            const toiletIcon = L.divIcon({
                className: 'custom-map-pin',
                html: '<i class="fa-solid fa-location-dot" style="color: #0056B3; text-shadow: 0 0 2px rgba(0,0,0,0.3);"></i>', 
                iconSize: [30, 42],
                iconAnchor: [15, 42],
                popupAnchor: [0, -40]
            });

            userMarker = L.marker([userCoords.lat, userCoords.lon], { icon: userIcon })
                .addTo(map)
                .bindPopup('ตำแหน่งของคุณ')
                .openPopup();
                
            const bounds = [[userCoords.lat, userCoords.lon]];
            toilets.forEach(toilet => {
                const fallbackDist = Math.round(toilet.distance_km * 1000);
                const marker = L.marker([toilet.lat, toilet.lon], { icon: toiletIcon })
                    .addTo(map)
                    .bindPopup(`${toilet.name}<br>${fallbackDist} เมตร`)
                toiletMarkers.push(marker);
                bounds.push([toilet.lat, toilet.lon]);
            });

            map.fitBounds(
                [
                    [userCoords.lat, userCoords.lon], 
                    [userCoords.lat, userCoords.lon]
                ], 
                {
                    paddingTopLeft: [0, 0],
                    paddingBottomRight: [0, 450],
                    maxZoom: 17
                }
            );
        }

        function createToiletCard(toilet, userCoords) {
            const card = document.createElement('div');
            card.className = 'toilet-card';
            const imageUrl = toilet.image_filename || 'photo/hongnum.png';
            
            const fallbackDist = Math.round(toilet.distance_km * 1000);
            const fallbackTime = Math.max(Math.round(toilet.distance_km * 12), 1);

            card.innerHTML = `
                <img src="${imageUrl}" alt="${toilet.name}" class="card-img">
                <h3 class="card-title">${toilet.name}</h3>
                <div class="card-status-row">
                    <span><span class="status-open">Open</span> <span class="status-time">${toilet.info ? ' • ' + toilet.info : ''}</span></span>
                    <span class="card-rating" style="cursor: pointer; transition: 0.2s;" onclick="openReviewModal('${toilet.name}')" title="แตะเพื่อให้คะแนน">
                        <i class="fa-solid fa-star" style="color: #FFC107;"></i> ${Number(toilet.average_rating || 0).toFixed(1)} (${toilet.review_count || 0})
                    </span>
                </div>
                <div class="card-meta-row">
                    <span class="meta-item dist-text"><i class="fa-solid fa-location-dot"></i> ${fallbackDist} เมตร</span>
                    <span class="meta-item time-text"><i class="fa-regular fa-clock"></i> ประมาณ ${fallbackTime} นาที</span>
                </div>
                <div class="card-actions">
                    <a href="routing.html?lat=${toilet.lat}&lon=${toilet.lon}&name=${encodeURIComponent(toilet.name)}&distance=${fallbackDist}&duration=${fallbackTime}&label=${encodeURIComponent(toilet.info || '')}" 
                       class="nav-link" style="text-decoration: none; flex: 1.5;">
                        <button class="btn-nav" style="width: 100%;">
                            <i class="fa-solid fa-paper-plane"></i> นำทาง
                        </button>
                    </a>
                    <button class="btn-action unavailable-feature"><i class="fa-regular fa-bookmark"></i> บันทึก</button>
                    <button class="btn-action unavailable-feature"><i class="fa-solid fa-arrow-up-from-bracket"></i> แชร์</button>
                </div>
            `;

            const distSpan = card.querySelector('.dist-text');
            const timeSpan = card.querySelector('.time-text');
            const navLink = card.querySelector('.nav-link');
            const osrmUrl = `https://routing.openstreetmap.de/routed-foot/route/v1/foot/${userCoords.lon},${userCoords.lat};${toilet.lon},${toilet.lat}?overview=false`;

            fetch(osrmUrl)
                .then(res => res.json())
                .then(data => {
                    if (data.routes && data.routes.length > 0) {
                        const route = data.routes[0];
                        const realDist = route.distance;
                        const realTime = Math.max(Math.round(route.duration / 60), 1);

                        const distFormatted = realDist >= 1000 ? (realDist / 1000).toFixed(1) + ' กม.' : Math.round(realDist) + ' เมตร';
                        
                        distSpan.innerHTML = `<i class="fa-solid fa-location-dot"></i> ${fallbackDist} เมตร`;
                        timeSpan.innerHTML = `<i class="fa-regular fa-clock"></i> ประมาณ ${realTime} นาที`;

                        navLink.href = `routing.html?lat=${toilet.lat}&lon=${toilet.lon}&name=${encodeURIComponent(toilet.name)}&distance=${realDist}&duration=${realTime}&label=${encodeURIComponent(toilet.info || '')}`;
                        
                        navLink.href = `routing.html?lat=${toilet.lat}&lon=${toilet.lon}&name=${encodeURIComponent(toilet.name)}&distance=${fallbackDist}&duration=${realTime}&label=${encodeURIComponent(toilet.info || '')}`;
                        
                        if (typeof index !== 'undefined' && toiletMarkers[index]) {
                            toiletMarkers[index].getPopup().setContent(`${toilet.name}<br>${fallbackDist} เมตร`);
                        }
                    }
                })
                .catch(err => {
                    console.error("OSRM Error:", err);
                    distSpan.innerHTML = `<i class="fa-solid fa-location-dot"></i> ${fallbackDist} เมตร`;
                    timeSpan.innerHTML = `<i class="fa-regular fa-clock"></i> ประมาณ ${fallbackTime} นาที`;
                    if (toiletMarkers[index]) {
                        toiletMarkers[index].getPopup().setContent(`${toilet.name}<br>${fallbackDist} เมตร`);
                    }
                });

            return card;
        }

        function loadNearestToilets() {
            const params = new URLSearchParams(window.location.search);
            const start = params.get('start');

            if (!start) {
                showError('ไม่มีตำแหน่งเริ่มต้น กรุณากลับไปกรอกตำแหน่งที่หน้าแรก');
                return;
            }

            const coords = parseLatLon(start);
            if (!coords) {
                showError('รูปแบบตำแหน่งไม่ถูกต้อง กรุณาใช้รูปแบบ lat, lon');
                return;
            }

            fetch('/api/nearest', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ lat: coords.lat, lon: coords.lon })
            })
                .then(async response => {
                    const data = await response.json();
                    if (!response.ok) {
                        throw new Error(data.error || 'ไม่สามารถเรียกข้อมูลได้');
                    }
                    return data;
                })

                .then(toilets => {
                    const toiletCards = document.getElementById('toilet-cards');
                    toiletCards.innerHTML = '';

                    if (!Array.isArray(toilets) || toilets.length === 0) {
                        showError('ไม่พบข้อมูลห้องน้ำใกล้เคียง');
                        return;
                    }

                    setMapMarkers(coords, toilets);
                    toilets.forEach((toilet, index) => {
                        toiletCards.appendChild(createToiletCard(toilet, coords, index));
                    });
                })

                .catch(error => {
                    console.error(error);
                    showError(error.message || 'เกิดข้อผิดพลาดในการโหลดข้อมูล');
                });
        }

        loadNearestToilets();

        const popup = document.getElementById('comingSoonPopup');
        const closeBtn = document.getElementById('closePopupBtn');

        document.addEventListener('click', function(e) {
            const target = e.target.closest('.unavailable-feature');
            if (!target) return;
            e.preventDefault();
            popup.classList.add('show');
        });

        closeBtn.addEventListener('click', function() {
            popup.classList.remove('show');
        });

        popup.addEventListener('click', function(e) {
            if (e.target === popup) {
                popup.classList.remove('show');
            }
        });

        // ระบบรีวิวห้องน้ำ
        let currentReviewToilet = "";
        let currentRating = 0;
        let redirectAfterReview = false;

        function openReviewModal(toiletName, isFromRouting = false) {
            currentReviewToilet = toiletName;
            redirectAfterReview = isFromRouting;
            document.getElementById('reviewTitle').textContent = `รีวิว: ${toiletName}`;
            
            // เช็คว่าเคยรีวิวหรือยัง
            const savedRating = localStorage.getItem(`review_${toiletName}`);
            const statusText = document.getElementById('reviewStatus');

            if (savedRating) {
                currentRating = parseInt(savedRating);
                statusText.textContent = "คุณเคยรีวิวแล้ว (สามารถแก้ไขได้)";
            } else {
                currentRating = 0;
                statusText.textContent = "แตะที่ดาวเพื่อให้คะแนน";
            }
            
            updateStarsUI(currentRating);
            document.getElementById('reviewPopup').classList.add('show');
        }

        function updateStarsUI(rating) {
            const stars = document.querySelectorAll('#starContainer i');
            stars.forEach(star => {
                if (parseInt(star.dataset.rating) <= rating) {
                    star.classList.add('star-active');
                } else {
                    star.classList.remove('star-active');
                }
            });
        }

        // จัดการเมื่อกดดาว
        document.querySelectorAll('#starContainer i').forEach(star => {
            star.addEventListener('click', function() {
                currentRating = parseInt(this.dataset.rating);
                updateStarsUI(currentRating);
                document.getElementById('reviewStatus').textContent = `คุณให้คะแนน ${currentRating} ดาว`;
            });
        });

        // จัดการปุ่มบันทึก
        document.getElementById('saveReviewBtn').addEventListener('click', function() {
            if (currentRating > 0) {
                // 1. ส่งข้อมูลไปหา Python Backend
                fetch('/api/add_review', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        name: currentReviewToilet.trim(), // ใส่ trim() กันช่องว่างส่วนเกิน
                        rating: currentRating
                    })
                })
                .then(response => response.json())
                .then(data => {
                    if(data.status === 'success') {
                        // 2. ถ้าเซฟสำเร็จ ก็เซฟไว้ในเครื่องด้วยเพื่อจำว่าเคยให้กี่ดาว (เอาไว้แก้ไข)
                        localStorage.setItem(`review_${currentReviewToilet}`, currentRating);
                        
                        alert('ขอบคุณสำหรับรีวิวค่ะ!');
                        closeReviewModal();
                        
                        // 3. หลอกเบราว์เซอร์ให้ดึงข้อมูลใหม่ (แก้ปัญหา Cache)
                        const params = new URLSearchParams(window.location.search);
                        const start = params.get('start');
                        if(start) {
                           window.location.href = window.location.pathname + '?start=' + start + '&_t=' + new Date().getTime();
                        } else {
                           location.reload(true);
                        }
                    } else {
                        alert('เกิดข้อผิดพลาด: ' + data.message);
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    alert('ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้');
                });

            } else {
                alert('กรุณาเลือกดาวก่อนบันทึกค่ะ');
            }
        });

        // จัดการปุ่มปิด
        document.getElementById('closeReviewBtn').addEventListener('click', closeReviewModal);

        function closeReviewModal() {
            document.getElementById('reviewPopup').classList.remove('show');
            if (redirectAfterReview) {
                window.location.href = 'home.html';
            }
        }
    </script>
</body>
</html>
